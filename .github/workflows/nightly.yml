name: Nightly Build

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
      - 'screenshots/**'
      - '**.md'
      - '.github/workflows/**'
      - 'src/test/**'
  workflow_dispatch:

jobs:
  filter_and_build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Runtime Variables
        id: vars
        run: |
          echo "date=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT
          
          BEFORE="${{ github.event.before }}"
          # If it's a new branch or manual run, we look at the last commit
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE" ]; then
            RANGE="HEAD~1..HEAD"
          else
            RANGE="$BEFORE..HEAD"
          fi
          
          # Count commits that aren't chores/docs
          VALID_COMMITS=$(git log --pretty=format:"%s" "$RANGE" | grep -vE "^(chore|docs|ci|test):" | wc -l || echo 0)
          
          # If manual trigger, always run. If push, check for valid commits.
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$VALID_COMMITS" -eq "0" ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 21
        if: steps.vars.outputs.should_run == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build with Gradle
        if: steps.vars.outputs.should_run == 'true'
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Prepare Artifacts
        if: steps.vars.outputs.should_run == 'true'
        run: |
          mkdir -p build/dist
          # Attempt to find the versioned jar, fallback to any jar if not found
          cp build/libs/*[0-9].jar build/dist/AVillagersDream-nightly.jar || cp build/libs/*.jar build/dist/AVillagersDream-nightly.jar

      - name: Refresh Nightly Tag
        if: steps.vars.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -f nightly
          git push origin :refs/tags/nightly || true
          git push origin nightly

      - name: Update Nightly Release
        if: steps.vars.outputs.should_run == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "🌙 Nightly Build - ${{ steps.vars.outputs.date }}"
          generate_release_notes: true
          body: |
            ### ⚠️ Experimental Build
            This build is automated and contains unpolished features. Use at your own risk!
            
            ---
            *Built from commit: ${{ github.sha }}*
          prerelease: true
          files: build/dist/AVillagersDream-nightly.jar
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}