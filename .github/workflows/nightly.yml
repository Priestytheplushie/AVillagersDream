name: Nightly Build

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
      - 'screenshots/**'
      - '**.md'
      - '.github/workflows/**'
      - 'src/test/**'
  workflow_dispatch:

jobs:
  filter_and_build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      should_run: ${{ steps.check_commits.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Check for meaningful changes
        id: check_commits
        run: |
          # Safe range detection
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE" ]; then
            RANGE="HEAD~1..HEAD"
          else
            RANGE="$BEFORE..$AFTER"
          fi

          # The fix: --pretty comes before the range argument
          VALID_COMMITS=$(git log --pretty=format:"%s" "$RANGE" | grep -vE "^(chore|docs|ci|test):" | wc -l)
          
          if [ "$VALID_COMMITS" -eq "0" ]; then
            echo "No code changes detected (only chores/docs). Skipping."
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 21
        if: steps.check_commits.outputs.should_run == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build with Gradle
        if: steps.check_commits.outputs.should_run == 'true'
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Prepare Artifacts
        if: steps.check_commits.outputs.should_run == 'true'
        run: |
          mkdir -p build/dist
          cp build/libs/*[0-9].jar build/dist/AVillagersDream-nightly.jar || cp build/libs/*.jar build/dist/AVillagersDream-nightly.jar

      - name: Generate Smart Changelog
        if: steps.check_commits.outputs.should_run == 'true'
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configurationJson: |
            {
              "categories": [
                { "title": "## ⚠️ Breaking Changes", "labels": [], "commit_prefix": "feat!:" },
                { "title": "## ⚠️ Breaking Changes", "labels": [], "commit_prefix": "fix!:" },
                { "title": "## 🚀 New Features", "labels": [], "commit_prefix": "feat:" },
                { "title": "## 🐛 Bug Fixes", "labels": [], "commit_prefix": "fix:" },
                { "title": "## 🎨 Visuals & Assets", "labels": [], "commit_prefix": "" }
              ],
              "ignore_labels": ["chore", "ci", "docs"],
              "template": "#CHANGELOG"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Refresh Nightly Tag
        if: steps.check_commits.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -d nightly || true
          git push origin :refs/tags/nightly || true
          git tag nightly
          git push origin nightly

      - name: Update Nightly Release
        if: steps.check_commits.outputs.should_run == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "🌙 Nightly Build - ${{ github.event.head_commit.timestamp }}"
          body: |
            ### ⚠️ Experimental Build
            This build is automated and contains unpolished features. Use at your own risk!
            
            ${{ steps.build_changelog.outputs.changelog }}
            
            ---
            *Built from commit: ${{ github.sha }}*
          prerelease: true
          files: build/dist/AVillagersDream-nightly.jar
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}