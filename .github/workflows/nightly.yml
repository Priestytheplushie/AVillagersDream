name: Nightly Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle' 
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build

    - name: Prepare Nightly Artifact
      run: |
        mkdir -p build/dist
        cp build/libs/*.jar build/dist/AVillagersDream-nightly.jar

    - name: Generate Changelog
      id: build_changelog
      uses: mikepenz/release-changelog-builder-action@v4
      with:
        toTag: ${{ github.sha }}
        fromTag: "nightly"
        failOnError: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Get Current Date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    - name: Update Nightly Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: nightly
        name: "Nightly Build - ${{ steps.date.outputs.date }}"
        body: |
          ## ⚠️ Experimental Nightly Build
          This build contains the latest "bleeding edge" features and bug fixes. It may be unstable!
          
          ### 📝 Changes since last nightly:
          ${{ steps.build_changelog.outputs.changelog }}
          
          ---
          *Full Diff: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})*
        prerelease: true
        files: build/dist/AVillagersDream-nightly.jar
        make_latest: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}